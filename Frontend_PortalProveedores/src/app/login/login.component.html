<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-[#0a0c14] relative overflow-hidden p-6 transition-colors duration-300">
    
    <!-- Background Orbs (Dark Mode Only) -->
    <div class="absolute top-0 left-0 w-full h-full hidden dark:block">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-600/10 rounded-full blur-[100px]"></div>
    </div>
    
    <!-- Background Patterns (Light Mode) -->
    <div class="absolute inset-0 dark:hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:20px_20px] opacity-30"></div>
    </div>

    <div class="w-full max-w-md relative z-10 animate-in fade-in zoom-in duration-700">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10 group">
            <div class="p-4 bg-indigo-600 rounded-3xl mb-4 shadow-2xl shadow-indigo-500/20 group-hover:rotate-12 transition-transform duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tighter">PORTAL</h1>
            <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-[0.4em] mt-1">Proveedores</span>
        </div>

        <!-- Login Card -->
        <div class="bg-white/80 dark:bg-[#0f111a]/80 backdrop-blur-2xl border border-slate-200 dark:border-white/5 rounded-[2.5rem] p-10 shadow-xl dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <div class="mb-8 text-center">
                <h2 class="text-xl font-bold text-slate-800 dark:text-white">Bienvenido de nuevo</h2>
                <p class="text-slate-500 dark:text-slate-500 text-sm font-medium mt-1">Ingrese sus datos para acceder al sistema.</p>
            </div>

            <form (ngSubmit)="onSubmit()" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Código de Proveedor</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-600 dark:group-focus-within:text-indigo-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16" /></svg>
                        </span>
                        <input type="text" [(ngModel)]="providerCode" name="providerCode"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/5 rounded-2xl text-slate-900 dark:text-white font-bold focus:outline-none focus:border-indigo-600/50 dark:focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300 placeholder-slate-300 dark:placeholder-slate-700"
                            placeholder="Código" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Correo Electrónico</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-600 dark:group-focus-within:text-indigo-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" /></svg>
                        </span>
                        <input type="email" [(ngModel)]="email" name="email"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/5 rounded-2xl text-slate-900 dark:text-white font-bold focus:outline-none focus:border-indigo-600/50 dark:focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300 placeholder-slate-300 dark:placeholder-slate-700"
                            placeholder="nombre@empresa.com" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Contraseña</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-600 dark:group-focus-within:text-indigo-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </span>
                        <input type="password" [(ngModel)]="password" name="password"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/5 rounded-2xl text-slate-900 dark:text-white font-bold focus:outline-none focus:border-indigo-600/50 dark:focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300 placeholder-slate-300 dark:placeholder-slate-700"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <div *ngIf="errorMessage"
                    class="bg-red-500/10 border border-red-500/20 text-red-500 dark:text-red-400 p-4 rounded-2xl text-xs font-bold text-center animate-shake">
                    {{ errorMessage }}
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-2xl shadow-xl shadow-indigo-600/20 transform hover:-translate-y-1 active:scale-95 transition-all duration-300 disabled:opacity-50 disabled:transform-none">
                    <span *ngIf="!isLoading">Acceder al Portal</span>
                    <span *ngIf="isLoading" class="flex items-center justify-center gap-3">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Verificando...
                    </span>
                </button>
            </form>
        </div>
        
        <p class="text-center mt-10 text-slate-400 dark:text-slate-600 text-xs font-bold uppercase tracking-widest">
            &copy; 2026 Sistema de Gestión de Proveedores
        </p>
    </div>
</div>
