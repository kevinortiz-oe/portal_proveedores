<div class="fixed top-[90px] right-4 z-[100] flex flex-col gap-2 pointer-events-none">
    <div *ngFor="let toast of toasts$ | async"
        class="pointer-events-auto flex items-center w-full max-w-xs p-4 text-white rounded-lg shadow-lg transition-transform transform translate-x-0"
        [ngClass]="{
             'bg-green-600': toast.type === 'success',
             'bg-red-600': toast.type === 'error',
             'bg-blue-600': toast.type === 'info',
             'bg-yellow-600': toast.type === 'warning'
         }">

        <!-- Icon Placeholder -->
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg bg-white/20">
            <span *ngIf="toast.type === 'success'">✓</span>
            <span *ngIf="toast.type === 'error'">✕</span>
            <span *ngIf="toast.type === 'info'">ℹ</span>
            <span *ngIf="toast.type === 'warning'">!</span>
        </div>

        <div class="ml-3 text-sm font-normal break-words">{{ toast.message }}</div>

        <button type="button"
            class="ml-auto -mx-1.5 -my-1.5 bg-transparent text-white rounded-lg focus:ring-2 focus:ring-white p-1.5 hover:bg-white/10 inline-flex h-8 w-8"
            (click)="remove(toast.id)">
            <span class="sr-only">Close</span>
            <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
            </svg>
        </button>
    </div>
</div>
